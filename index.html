<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz F.A.S.T. - AfriVision Studio</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Quiz F.A.S.T.</h1>
            <p>Trouvez vos 3 meilleures bourses en 2 minutes</p>
        </header>

        <form id="quizForm">
            <div class="question">
                <h3>1. Quel est votre niveau d'études ?</h3>
                <select id="q1" required>
                    <option value="" disabled selected>Sélectionnez une option</option>
                    <option value="licence">Licence (Bac+3)</option>
                    <option value="master1">Master 1 (Bac+4)</option>
                    <option value="master2">Master 2 (Bac+5)</option>
                </select>
            </div>

            <div class="question">
                <h3>2. Dans quel domaine étudiez-vous ?</h3>
                <select id="q2" required>
                    <option value="" disabled selected>Sélectionnez une option</option>
                    <option value="informatique">Informatique</option>
                    <option value="ingenierie">Ingénierie</option>
                    <option value="sante">Santé</option>
                    <option value="droit">Droit</option>
                    <option value="autre">Autre</option>
                </select>
            </div>

            <div class="question">
                <h3>3. Souhaitez-vous étudier à l'étranger ?</h3>
                <select id="q3" required>
                    <option value="" disabled selected>Sélectionnez une option</option>
                    <option value="oui">Oui</option>
                    <option value="non">Non</option>
                </select>
            </div>

            <div class="form-group">
                <input type="email" id="email" placeholder="Votre email" required>
            </div>

            <button type="submit" class="submit-btn">Obtenir mes résultats</button>
        </form>

        <div id="result" class="hidden">
            <h2>Merci pour votre participation !</h2>
            <p>Vos résultats vous seront envoyés par email sous 24h.</p>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
